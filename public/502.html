<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Temporarily Unavailable - OmniAIFlow</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0f0f1a;
            color: #ffffff;
            overflow: hidden;
        }

        /* Animated background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(120, 60, 220, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(60, 120, 220, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(180, 60, 180, 0.1) 0%, transparent 50%);
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(100, 60, 255, 0.03) 0%, transparent 70%);
            animation: pulse 8s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
            max-width: 560px;
            width: 100%;
        }

        /* Animated icon */
        .icon-wrapper {
            margin-bottom: 2rem;
            position: relative;
            display: inline-block;
        }

        .icon-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(120, 60, 220, 0.2), rgba(60, 120, 220, 0.2));
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            position: relative;
            animation: float 3s ease-in-out infinite;
        }

        .icon-circle::before {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7c3aed, #3b82f6, #a855f7);
            z-index: -1;
            opacity: 0.6;
            animation: spin 6s linear infinite;
        }

        .icon-circle::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: #0f0f1a;
            z-index: -1;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .icon-svg {
            width: 56px;
            height: 56px;
            color: #a78bfa;
        }

        /* Error code */
        .error-code {
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #a78bfa;
            margin-bottom: 1rem;
            display: inline-block;
            padding: 0.35rem 1rem;
            border: 1px solid rgba(167, 139, 250, 0.3);
            border-radius: 9999px;
            background: rgba(167, 139, 250, 0.08);
        }

        .title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #ffffff 0%, #c4b5fd 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.3;
        }

        .description {
            font-size: 1.1rem;
            color: #94a3b8;
            line-height: 1.7;
            margin-bottom: 2.5rem;
        }

        .description strong {
            color: #c4b5fd;
            font-weight: 500;
        }

        /* Action buttons */
        .actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 2.5rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.75rem;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, #7c3aed, #6366f1);
            color: #ffffff;
            box-shadow: 0 4px 20px rgba(124, 58, 237, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(124, 58, 237, 0.45);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.06);
            color: #c4b5fd;
            border: 1px solid rgba(167, 139, 250, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(167, 139, 250, 0.4);
            transform: translateY(-2px);
        }

        .btn svg {
            width: 18px;
            height: 18px;
        }

        /* Status info */
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 1rem 1.5rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            margin-bottom: 1.5rem;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #f59e0b;
            animation: blink 2s ease-in-out infinite;
            flex-shrink: 0;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .status-text {
            font-size: 0.9rem;
            color: #94a3b8;
        }

        /* Auto-refresh countdown */
        .countdown {
            font-size: 0.85rem;
            color: #64748b;
        }

        .countdown span {
            color: #a78bfa;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .title {
                font-size: 1.5rem;
            }
            .description {
                font-size: 1rem;
            }
            .icon-circle {
                width: 100px;
                height: 100px;
            }
            .icon-svg {
                width: 44px;
                height: 44px;
            }
            .actions {
                flex-direction: column;
                align-items: center;
            }
            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>

    <div class="container">
        <div class="icon-wrapper">
            <div class="icon-circle">
                <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 9v4"/>
                    <path d="M12 17h.01"/>
                    <path d="M3.6 15.4L10.4 3.6a1.85 1.85 0 0 1 3.2 0l6.8 11.8a1.85 1.85 0 0 1-1.6 2.8H5.2a1.85 1.85 0 0 1-1.6-2.8z"/>
                </svg>
            </div>
        </div>

        <div class="error-code">Error 502</div>

        <h1 class="title">We're getting things back on track</h1>

        <p class="description">
            Our servers are taking a quick breather. This usually resolves on its own within a few moments.
            <strong>Your data is safe</strong> — nothing has been lost.
        </p>

        <div class="status-bar">
            <div class="status-dot"></div>
            <span class="status-text">Our team has been automatically notified and is looking into it</span>
        </div>

        <div class="actions">
            <button class="btn btn-primary" onclick="window.location.reload()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 2v6h-6"/>
                    <path d="M3 12a9 9 0 0 1 15-6.7L21 8"/>
                    <path d="M3 22v-6h6"/>
                    <path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
                </svg>
                Try Again
            </button>
            <a class="btn btn-secondary" href="/">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                    <polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
                Go Home
            </a>
        </div>

        <div class="countdown">
            Auto-refreshing in <span id="timer">30</span>s
        </div>
    </div>

    <script>
        // Auto-refresh countdown
        let seconds = 30;
        const timerEl = document.getElementById('timer');

        const interval = setInterval(() => {
            seconds--;
            timerEl.textContent = seconds;
            if (seconds <= 0) {
                clearInterval(interval);
                window.location.reload();
            }
        }, 1000);
    </script>
</body>
</html>
